<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Job Portal Platform</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/logo1.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../Data/data-init.js"></script>
  <script src="../controllers/auth.js"></script>
  <link rel="stylesheet" href="./register.css">
</head>
<body class="auth-page px-4 py-8">
  <div class="auth-shell mx-auto flex min-h-[calc(100vh-4rem)] w-full max-w-2xl items-center justify-center">
    <div class="auth-card w-full rounded-[28px] p-8 sm:p-10">
      <div class="auth-logo mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-2xl bg-white">
        <img src="../assets/images/logo1.jpg" alt="Job Portal logo" class="h-14 w-14 rounded-xl object-cover">
      </div>

      <div class="text-center">
        <h1 class="auth-title text-4xl font-extrabold text-slate-900">Tạo Tài Khoản</h1>
        <p class="mt-2 text-sm text-slate-600">Bắt đầu hành trình tuyển dụng cùng Job Portal</p>
      </div>

      <div class="mt-7 grid grid-cols-2 gap-3 rounded-2xl bg-violet-100/80 p-1.5">
        <button type="button" id="role-candidate" class="auth-toggle auth-toggle-active rounded-xl border-2 px-4 py-2.5 font-semibold">Ứng viên</button>
        <button type="button" id="role-recruiter" class="auth-toggle auth-toggle-inactive rounded-xl border-2 px-4 py-2.5 font-semibold">Nhà tuyển dụng</button>
      </div>

      <p id="register-error" class="mt-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-600 hidden"></p>

      <form id="candidate-form" class="mt-5 space-y-3">
        <input id="candidate-name" type="text" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Họ tên" required>
        <input id="candidate-email" type="email" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Email" required>
        <input id="candidate-password" type="password" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Mật khẩu" required>
        <input id="candidate-birthdate" type="date" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800" required>
        <input id="candidate-location" type="text" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Nơi ở" required>
        <button type="submit" class="auth-button w-full rounded-xl bg-gradient-to-r from-pink-500 to-indigo-500 py-3 text-base font-bold text-white">Tiếp tục</button>
      </form>

      <form id="recruiter-form" class="mt-5 space-y-3 hidden">
        <input id="recruiter-company" type="text" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Tên công ty" required>
        <input id="recruiter-email" type="email" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Email" required>
        <input id="recruiter-phone" type="tel" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Số điện thoại" required>
        <input id="recruiter-password" type="password" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Mật khẩu" required>
        <button type="submit" class="auth-button w-full rounded-xl bg-gradient-to-r from-pink-500 to-indigo-500 py-3 text-base font-bold text-white">Tiếp tục</button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-600">
        Đã có tài khoản?
        <a href="login.html" class="auth-link">Đăng nhập</a>
      </div>

      <div class="auth-panel mt-4 rounded-2xl p-4 text-sm text-slate-600">
        <label class="flex items-start gap-2 text-slate-700">
          <input id="register-agree" type="checkbox" class="mt-1 h-4 w-4 rounded border-slate-300 text-fuchsia-600 focus:ring-fuchsia-500">
          <span>
            Tôi đồng ý với
            <button id="register-terms-link" type="button" class="auth-link">Điều khoản đăng ký</button>
            và
            <button id="register-privacy-link" type="button" class="auth-link">Chính sách bảo mật</button>
            của nền tảng.
          </span>
        </label>
      </div>


    </div>
  </div>

  <div id="otp-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
    <div class="auth-modal-card w-full max-w-sm rounded-2xl bg-white p-6">
      <h2 class="text-xl font-bold text-slate-800">Xác thực OTP</h2>
      <p class="mt-2 text-sm text-slate-600">Nhập mã OTP đã nhận (demo: 123456)</p>
      <p id="otp-error" class="mt-3 text-sm text-red-600 hidden"></p>
      <form id="otp-form" class="mt-3 space-y-3">
        <input id="otp-input" type="text" maxlength="6" class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-fuchsia-500" placeholder="Nhập OTP" required>
        <div class="flex gap-3">
          <button type="submit" class="flex-1 rounded-xl bg-gradient-to-r from-pink-500 to-indigo-500 py-2 text-white font-semibold">Xác thực</button>
          <button id="otp-cancel" type="button" class="flex-1 rounded-xl bg-slate-200 py-2 font-semibold text-slate-700">Hủy</button>
        </div>
      </form>
    </div>
  </div>

  <div id="policy-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
    <div class="auth-modal-card w-full max-w-lg rounded-2xl bg-white p-6">
      <div class="flex items-start justify-between gap-3">
        <h2 id="policy-title" class="text-xl font-bold text-slate-800">Điều khoản đăng ký</h2>
        <button id="policy-close" type="button" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-semibold text-slate-600 hover:bg-slate-50">Đóng</button>
      </div>
      <div id="policy-content" class="mt-4 max-h-72 overflow-y-auto text-sm leading-6 text-slate-700"></div>
    </div>
  </div>

  <script src="./register.js"></script>
</body>
</html>
