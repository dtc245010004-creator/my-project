<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Job Portal Platform</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/logo1.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../Data/data-init.js"></script>
  <script src="../controllers/auth.js"></script>
  <style>
    :root {
      color-scheme: light;
    }

    body.auth-page {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.28), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.18), transparent 28%),
        linear-gradient(135deg, #7c3aed 0%, #c026d3 48%, #4f46e5 100%);
      position: relative;
      overflow-x: hidden;
    }

    body.auth-page::before,
    body.auth-page::after {
      content: '';
      position: fixed;
      inset: auto;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(12px);
      opacity: 0.22;
    }

    body.auth-page::before {
      width: 320px;
      height: 320px;
      top: -90px;
      right: -80px;
      background: rgba(255, 255, 255, 0.9);
    }

    body.auth-page::after {
      width: 260px;
      height: 260px;
      left: -90px;
      bottom: -70px;
      background: rgba(255, 255, 255, 0.7);
    }

    .auth-shell {
      position: relative;
      z-index: 1;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 30px 80px rgba(17, 24, 39, 0.22);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .auth-logo {
      box-shadow: 0 18px 36px rgba(236, 72, 153, 0.26);
    }

    .auth-title {
      letter-spacing: -0.04em;
    }

    .auth-label {
      font-size: 0.78rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      font-weight: 800;
      color: #475569;
    }

    .auth-input {
      border: 1px solid rgba(148, 163, 184, 0.36);
      background: rgba(255, 255, 255, 0.96);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .auth-input:focus {
      outline: none;
      border-color: rgba(217, 70, 239, 0.6);
      box-shadow: 0 0 0 4px rgba(217, 70, 239, 0.16);
      transform: translateY(-1px);
    }

    .auth-button {
      position: relative;
      overflow: hidden;
      box-shadow: 0 18px 28px rgba(192, 38, 211, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .auth-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 22px 34px rgba(192, 38, 211, 0.28);
    }

    .auth-link {
      color: #db2777;
      font-weight: 700;
    }

    .auth-link:hover {
      color: #be185d;
    }

    .auth-panel {
      border: 1px solid rgba(192, 132, 252, 0.18);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 250, 252, 0.96));
    }

    .auth-toggle {
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease, color 0.2s ease;
    }

    .auth-toggle-active {
      color: white;
      background: linear-gradient(90deg, #ec4899, #4f46e5);
      border-color: #ec4899;
      box-shadow: 0 18px 28px rgba(192, 38, 211, 0.22);
      transform: translateY(-1px);
    }

    .auth-toggle-inactive {
      color: #334155;
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(196, 181, 253, 0.9);
    }

    .auth-modal-card {
      box-shadow: 0 28px 70px rgba(15, 23, 42, 0.25);
      border: 1px solid rgba(226, 232, 240, 0.9);
    }
  </style>
</head>
<body class="auth-page px-4 py-8">
  <div class="auth-shell mx-auto flex min-h-[calc(100vh-4rem)] w-full max-w-2xl items-center justify-center">
    <div class="auth-card w-full rounded-[28px] p-8 sm:p-10">
      <div class="auth-logo mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-2xl bg-white">
        <img src="../assets/images/logo1.jpg" alt="Job Portal logo" class="h-14 w-14 rounded-xl object-cover">
      </div>

      <div class="text-center">
        <h1 class="auth-title text-4xl font-extrabold text-slate-900">Tạo Tài Khoản</h1>
        <p class="mt-2 text-sm text-slate-600">Bắt đầu hành trình tuyển dụng cùng Job Portal</p>
      </div>

      <div class="mt-7 grid grid-cols-2 gap-3 rounded-2xl bg-violet-100/80 p-1.5">
        <button type="button" id="role-candidate" class="auth-toggle auth-toggle-active rounded-xl border-2 px-4 py-2.5 font-semibold">Ứng viên</button>
        <button type="button" id="role-recruiter" class="auth-toggle auth-toggle-inactive rounded-xl border-2 px-4 py-2.5 font-semibold">Nhà tuyển dụng</button>
      </div>

      <p id="register-error" class="mt-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-600 hidden"></p>

      <form id="candidate-form" class="mt-5 space-y-3">
        <input id="candidate-name" type="text" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Họ tên" required>
        <input id="candidate-email" type="email" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Email" required>
        <input id="candidate-password" type="password" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Mật khẩu" required>
        <input id="candidate-birthdate" type="date" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800" required>
        <input id="candidate-location" type="text" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Nơi ở" required>
        <button type="submit" class="auth-button w-full rounded-xl bg-gradient-to-r from-pink-500 to-indigo-500 py-3 text-base font-bold text-white">Tiếp tục</button>
      </form>

      <form id="recruiter-form" class="mt-5 space-y-3 hidden">
        <input id="recruiter-company" type="text" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Tên công ty" required>
        <input id="recruiter-email" type="email" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Email" required>
        <input id="recruiter-phone" type="tel" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Số điện thoại" required>
        <input id="recruiter-password" type="password" class="auth-input w-full rounded-xl px-4 py-2.5 text-slate-800 placeholder-slate-400" placeholder="Mật khẩu" required>
        <button type="submit" class="auth-button w-full rounded-xl bg-gradient-to-r from-pink-500 to-indigo-500 py-3 text-base font-bold text-white">Tiếp tục</button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-600">
        Đã có tài khoản?
        <a href="login.html" class="auth-link">Đăng nhập</a>
      </div>

      <div class="auth-panel mt-4 rounded-2xl p-4 text-sm text-slate-600">
        <label class="flex items-start gap-2 text-slate-700">
          <input id="register-agree" type="checkbox" class="mt-1 h-4 w-4 rounded border-slate-300 text-fuchsia-600 focus:ring-fuchsia-500">
          <span>
            Tôi đồng ý với
            <button id="register-terms-link" type="button" class="auth-link">Điều khoản đăng ký</button>
            và
            <button id="register-privacy-link" type="button" class="auth-link">Chính sách bảo mật</button>
            của nền tảng.
          </span>
        </label>
      </div>


    </div>
  </div>

  <div id="otp-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
    <div class="auth-modal-card w-full max-w-sm rounded-2xl bg-white p-6">
      <h2 class="text-xl font-bold text-slate-800">Xác thực OTP</h2>
      <p class="mt-2 text-sm text-slate-600">Nhập mã OTP đã nhận (demo: 123456)</p>
      <p id="otp-error" class="mt-3 text-sm text-red-600 hidden"></p>
      <form id="otp-form" class="mt-3 space-y-3">
        <input id="otp-input" type="text" maxlength="6" class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-fuchsia-500" placeholder="Nhập OTP" required>
        <div class="flex gap-3">
          <button type="submit" class="flex-1 rounded-xl bg-gradient-to-r from-pink-500 to-indigo-500 py-2 text-white font-semibold">Xác thực</button>
          <button id="otp-cancel" type="button" class="flex-1 rounded-xl bg-slate-200 py-2 font-semibold text-slate-700">Hủy</button>
        </div>
      </form>
    </div>
  </div>

  <div id="policy-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
    <div class="auth-modal-card w-full max-w-lg rounded-2xl bg-white p-6">
      <div class="flex items-start justify-between gap-3">
        <h2 id="policy-title" class="text-xl font-bold text-slate-800">Điều khoản đăng ký</h2>
        <button id="policy-close" type="button" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-semibold text-slate-600 hover:bg-slate-50">Đóng</button>
      </div>
      <div id="policy-content" class="mt-4 max-h-72 overflow-y-auto text-sm leading-6 text-slate-700"></div>
    </div>
  </div>

  <script>
    initializeData(false);

    var activeRole = 'candidate';
    var pendingPayload = null;

    var candidateBtn = document.getElementById('role-candidate');
    var recruiterBtn = document.getElementById('role-recruiter');
    var candidateForm = document.getElementById('candidate-form');
    var recruiterForm = document.getElementById('recruiter-form');
    var registerAgree = document.getElementById('register-agree');
    var registerTermsLink = document.getElementById('register-terms-link');
    var registerPrivacyLink = document.getElementById('register-privacy-link');
    var policyModal = document.getElementById('policy-modal');
    var policyTitle = document.getElementById('policy-title');
    var policyContent = document.getElementById('policy-content');
    var policyClose = document.getElementById('policy-close');

    function setRole(role) {
      activeRole = role;
      var candidateActive = role === 'candidate';

      candidateForm.classList.toggle('hidden', !candidateActive);
      recruiterForm.classList.toggle('hidden', candidateActive);

      candidateBtn.className = candidateActive
        ? 'auth-toggle auth-toggle-active rounded-xl border-2 px-4 py-2.5 font-semibold'
        : 'auth-toggle auth-toggle-inactive rounded-xl border-2 px-4 py-2.5 font-semibold';
      recruiterBtn.className = candidateActive
        ? 'auth-toggle auth-toggle-inactive rounded-xl border-2 px-4 py-2.5 font-semibold'
        : 'auth-toggle auth-toggle-active rounded-xl border-2 px-4 py-2.5 font-semibold';
    }

    candidateBtn.addEventListener('click', function () { setRole('candidate'); });
    recruiterBtn.addEventListener('click', function () { setRole('recruiter'); });

    function openPolicyModal(type) {
      if (type === 'privacy') {
        policyTitle.textContent = 'Chính sách bảo mật';
        policyContent.innerHTML = [
          '<p>1. Chúng tôi chỉ thu thập các thông tin cần thiết cho quá trình đăng ký, xác thực tài khoản và kết nối tuyển dụng.</p>',
          '<p>2. Dữ liệu tài khoản và hồ sơ ứng tuyển được lưu trữ trong phạm vi hệ thống demo, không chia sẻ trái phép cho bên thứ ba.</p>',
          '<p>3. Bạn có quyền yêu cầu chỉnh sửa hoặc xóa thông tin cá nhân theo chính sách của nền tảng.</p>',
          '<p>4. Người dùng chịu trách nhiệm bảo mật thông tin đăng nhập và nội dung đã cung cấp.</p>'
        ].join('');
      } else {
        policyTitle.textContent = 'Điều khoản đăng ký';
        policyContent.innerHTML = [
          '<p>1. Người dùng cam kết cung cấp thông tin chính xác, hợp lệ khi tạo tài khoản.</p>',
          '<p>2. Không sử dụng hệ thống để đăng tải nội dung sai sự thật, gian lận hoặc vi phạm pháp luật.</p>',
          '<p>3. Tài khoản vi phạm có thể bị tạm khóa hoặc chấm dứt theo chính sách của nền tảng.</p>',
          '<p>4. Việc hoàn tất đăng ký đồng nghĩa bạn đã đọc và đồng ý với các điều khoản nêu trên.</p>'
        ].join('');
      }

      policyModal.classList.remove('hidden');
      policyModal.classList.add('flex');
    }

    function closePolicyModal() {
      policyModal.classList.add('hidden');
      policyModal.classList.remove('flex');
    }

    registerTermsLink.addEventListener('click', function () {
      openPolicyModal('terms');
    });

    registerPrivacyLink.addEventListener('click', function () {
      openPolicyModal('privacy');
    });

    policyClose.addEventListener('click', closePolicyModal);

    policyModal.addEventListener('click', function (event) {
      if (event.target === policyModal) {
        closePolicyModal();
      }
    });

    function validateAgreement() {
      if (!registerAgree.checked) {
        showRegisterError('Vui lòng đồng ý Điều khoản đăng ký và Chính sách bảo mật trước khi tiếp tục.');
        return false;
      }

      return true;
    }

    function showRegisterError(text) {
      var el = document.getElementById('register-error');
      el.textContent = text;
      el.classList.remove('hidden');
    }

    function clearRegisterError() {
      document.getElementById('register-error').classList.add('hidden');
    }

    function openOtpModal() {
      document.getElementById('otp-error').classList.add('hidden');
      document.getElementById('otp-input').value = '';
      var modal = document.getElementById('otp-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      document.getElementById('otp-input').focus();
    }

    function closeOtpModal() {
      var modal = document.getElementById('otp-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      pendingPayload = null;
    }

    document.getElementById('otp-cancel').addEventListener('click', closeOtpModal);

    candidateForm.addEventListener('submit', function (e) {
      e.preventDefault();
      clearRegisterError();

      if (!validateAgreement()) {
        return;
      }

      pendingPayload = {
        role: 'candidate',
        name: document.getElementById('candidate-name').value.trim(),
        email: document.getElementById('candidate-email').value.trim(),
        password: document.getElementById('candidate-password').value.trim(),
        birthDate: document.getElementById('candidate-birthdate').value,
        location: document.getElementById('candidate-location').value.trim()
      };

      if (Auth.calculateAge(pendingPayload.birthDate) < 16) {
        alert('Duoi 16 tuoi khong the dang ky.');
        return;
      }

      if (Auth.emailExists(pendingPayload.email)) {
        showRegisterError('Email da ton tai. Vui long dung email khac.');
        return;
      }

      Auth.sendOtpMock();
      openOtpModal();
    });

    recruiterForm.addEventListener('submit', function (e) {
      e.preventDefault();
      clearRegisterError();

      if (!validateAgreement()) {
        return;
      }

      pendingPayload = {
        role: 'recruiter',
        companyName: document.getElementById('recruiter-company').value.trim(),
        email: document.getElementById('recruiter-email').value.trim(),
        phone: document.getElementById('recruiter-phone').value.trim(),
        password: document.getElementById('recruiter-password').value.trim()
      };

      if (Auth.emailExists(pendingPayload.email)) {
        showRegisterError('Email da ton tai. Vui long dung email khac.');
        return;
      }

      Auth.sendOtpMock();
      openOtpModal();
    });

    document.getElementById('otp-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var otp = document.getElementById('otp-input').value.trim();
      if (otp !== '123456') {
        var otpErr = document.getElementById('otp-error');
        otpErr.textContent = 'OTP khong dung.';
        otpErr.classList.remove('hidden');
        return;
      }

      if (!pendingPayload) {
        closeOtpModal();
        return;
      }

      var result = pendingPayload.role === 'candidate'
        ? Auth.registerCandidate(pendingPayload)
        : Auth.registerRecruiter(pendingPayload);

      if (!result.success) {
        closeOtpModal();
        showRegisterError(result.message || 'Dang ky that bai.');
        return;
      }

      closeOtpModal();
      alert('Dang ky thanh cong. Moi ban dang nhap.');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
